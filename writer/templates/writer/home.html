<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LinkedForge AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

/* =========================
   1. ROOT THEME VARIABLES
========================= */
:root {
    --bg: #1b1c1b;
    --card: #262826;
    --text: #f5f5f5;
    --border: rgba(255,255,255,0.15);
    --input-bg: rgba(255,255,255,0.03);
    --muted: rgba(255,255,255,0.6);
}

/* LIGHT MODE */
body.light {
    --bg: #f5f5f5;
    --card: #ffffff;
    --text: #222;
    --border: rgba(0,0,0,0.15);
    --input-bg: #f8f8f8;
    --muted: rgba(0,0,0,0.6);
}

/* =========================
   2. BODY
========================= */
body {
    background: var(--bg);
    color: var(--text);
    transition: 0.3s ease;
    font-family: system-ui, -apple-system, sans-serif;
}

/* =========================
   3. NAVBAR
========================= */
.navbar {
    background: transparent;
}

/* =========================
   4. CARD / GLASS BOX
========================= */
.glass {
    background: var(--card);
    border-radius: 18px;
    padding: 20px;
    border: 1px solid var(--border);
}

/* =========================
   5. LABELS
========================= */
label {
    font-size: 13px;
    margin-bottom: 4px;
    color: var(--muted);
}

/* =========================
   6. INPUT / SELECT (🔥 FIXED DARK MODE ISSUE)
========================= */
.form-control,
.form-select {
    background: var(--input-bg) !important;
    color: var(--text) !important;
    border: 1px solid var(--border) !important;
    border-radius: 10px;
    padding: 8px 10px;
    font-size: 14px;
    transition: 0.25s ease;
}

/* placeholder */
.form-control::placeholder {
    color: var(--muted);
}

/* focus */
.form-control:focus,
.form-select:focus {
    border-color: #4f8cff !important;
    box-shadow: 0 0 0 2px rgba(79,140,255,0.2);
    outline: none;
}

/* dropdown option fix */
.form-select option {
    background: var(--card);
    color: var(--text);
}

/* textarea */
textarea.form-control {
    height: 110px;
    resize: none;
}

/* =========================
   7. OUTPUT BOX
========================= */
.output {
    overflow-y: auto;
    background: rgba(0,0,0,0.2);
    border-radius: 12px;
    padding: 15px;

    white-space: pre-wrap;
    line-height: 1.7;

    display: block;
    text-align: left;
    margin: 0;
}

/* light mode output */
body.light .output {
    background: rgba(0,0,0,0.05);
}

/* =========================
   8. TOOL ICON BUTTONS
========================= */
.tool-btn {
    background: rgba(255,255,255,0.08);
    padding: 10px 14px;
    border-radius: 50px;
    cursor: pointer;
    transition: 0.3s ease;
}

body.light .tool-btn {
    background: rgba(0,0,0,0.06);
}

.tool-btn:hover {
    transform: scale(1.1);
}

.copied {
    background: #28a745 !important;
    color: #fff;
}

/* =========================
   9. THEME TOGGLE ICON
========================= */
.toggle {
    cursor: pointer;
    font-size: 18px;
}

/* =========================
   10. LAYOUT FIX
========================= */
.fixed-height {
    height: 450px;
}

.flex-grow {
    flex-grow: 1;
}

/* =========================
   11. HERO TEXT
========================= */
.hero-title {
    font-size: 26px;
    font-weight: 700;
    line-height: 1.3;
}

.gradient-text {
    background: linear-gradient(90deg, #0d6efd, #4f8cff, #7aa7ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.hero-sub {
    margin-top: 10px;
    font-size: 15px;
    color: var(--muted);
}

/* =========================
   12. RESPONSIVE
========================= */
@media(max-width: 768px){
    .fixed-height {
        height: auto;
    }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar p-3">
<div class="container d-flex justify-content-between">
    <h4>🚀 LinkedForge</h4>

    <div class="toggle" id="themeToggle">
        <i class="fa-solid fa-moon"></i>
    </div>
</div>
</nav>
<br>

<div class="container text-center py-4">

    <h3 class="hero-title">
        Turn raw thoughts into  
        <span class="gradient-text">premium LinkedIn posts</span>
    </h3>

    <p class="hero-sub">
        Powered by AI — crafted for reach, clarity & engagement 🚀
    </p>

</div>

<div class="container py-4">

<div class="row g-4 align-items-stretch">

<!-- LEFT -->
<div class="col-lg-5 d-flex">
    <div class="glass w-100 d-flex flex-column fixed-height">

        <form method="post" class="d-flex flex-column h-100">
            {% csrf_token %}

            <!-- FORM FIELDS -->
            <div class="flex-grow">
                {{ form.as_p }}
            </div>

            <!-- BUTTON -->
            <div>
                <button class="btn btn-primary btn-sm w-50">
                    Generate Post
                </button>
            </div>

        </form>

    </div>
</div>

<!-- RIGHT -->
<div class="col-lg-7 d-flex">
    <div class="glass w-100 d-flex flex-column fixed-height">

        <!-- TITLE -->
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h5>✨ Generated Post</h5>
        </div>

        <!-- OUTPUT -->
<div id="generatedPost" class="output flex-grow" style="white-space: pre-wrap; line-height: 1.5;">
{% if output %}{{ output }}{% else %}<span style="opacity:0.6;">Your generated LinkedIn post will appear here...</span>{% endif %}
</div>

        <!-- ICONS -->
        <div class="d-flex gap-3 mt-3">
            <div id="copyBtn" class="tool-btn">
                <i class="fa-regular fa-copy"></i>
            </div>

            <div id="editBtn" class="tool-btn">
                <i class="fa-regular fa-pen-to-square"></i>
            </div>
        </div>

    </div>
</div>

</div>
</div>

<script>
const post = document.getElementById('generatedPost');
const copyBtn = document.getElementById('copyBtn');
const editBtn = document.getElementById('editBtn');
const toggle = document.getElementById('themeToggle');

// COPY + TICK
copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(post.innerText);

    copyBtn.classList.add('copied');
    copyBtn.innerHTML = '<i class="fa-solid fa-check"></i>';

    setTimeout(()=>{
        copyBtn.classList.remove('copied');
        copyBtn.innerHTML = '<i class="fa-regular fa-copy"></i>';
    },1000);
});

// EDIT
editBtn.addEventListener('click', () => {
    post.contentEditable = true;
    post.focus();
});

// DARK / LIGHT
toggle.addEventListener('click', () => {
    document.body.classList.toggle('light');

    toggle.innerHTML = document.body.classList.contains('light')
        ? '<i class="fa-solid fa-sun"></i>'
        : '<i class="fa-solid fa-moon"></i>';
});
</script>

</body>
</html>
