<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>History - LinkedForge</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet" href="{% static 'css/style.css' %}">
<link rel="stylesheet" href="{% static 'css/history.css' %}">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar p-3">
<div class="container d-flex justify-content-between align-items-center">

    <h4 class="mb-0">🚀 LinkedForge</h4>

    <div class="toggle" id="themeToggle">
        <i class="fa-solid fa-moon"></i>
    </div>

</div>
</nav>

<!-- CONTENT -->
<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div class="history-heading">
            <h2 class="history-title mb-1">
                📚 Recent 
                <span class="gradient-text">Generated Posts</span>
            </h2>

            <p class="history-sub mb-0">
                Last 5 AI-crafted LinkedIn post history . . . . 
            </p>
        </div>

        <a href="/" class="back-home-btn btn btn-sm">
            ← Back Home
        </a>
    </div>

    <!-- GRID -->
    <div class="history-grid">

        {% for post in posts %}

        <div class="history-card">

            <!-- TEXT -->
            <div class="mb-2">
                <p class="mb-1"><strong>💡 Thought:</strong> {{ post.raw_thought }}</p>
                <p class="mb-1"><strong>🎯 Tone:</strong> {{ post.tone }}</p>
            </div>

            <!-- OUTPUT -->
            <div class="post-box mb-2 history-post">{{ post.generated_post }}</div>

            <!-- ACTIONS -->
            <div class="d-flex gap-2">

                <!-- COPY -->
                <div class="tool-btn copyBtn">
                    <i class="fa-regular fa-copy"></i>
                </div>

                <!-- EDIT -->
                <div class="tool-btn editBtn">
                    <i class="fa-regular fa-pen-to-square"></i>
                </div>

            </div>

        </div>

        {% empty %}

        <div class="history-card">
            No history yet.
        </div>

        {% endfor %}

    </div>

</div>

<!-- JS -->
<script src="{% static 'js/history.js' %}"></script>


</body>
</html>
