<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1b1c1b 0%, #232526 45%, #2c2f2c 100%);
            color: #f5f5f5;
        }
        .glass-card {
            background: rgba(38, 40, 38, 0.88);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 20px 50px rgba(0,0,0,0.35);
            border-radius: 22px;
            backdrop-filter: blur(8px);
        }
        .post-box {
            background: #202220;
            border: 1px solid #333633;
            border-radius: 14px;
            padding: 16px;
            white-space: pre-wrap;
            line-height: 1.7;
        }
        .muted { color: #b8c0b8; }
    </style>
</head>
<body>
<div class="container py-5" style="max-width: 900px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="mb-1">📚 Recent Generated Posts</h1>
            <p class="muted mb-0">Showing only your latest 5 AI generations</p>
        </div>
        <a href="/" class="btn btn-outline-light">← Back Home</a>
    </div>

    {% for post in posts %}
    <div class="glass-card p-4 my-3">
        <p><strong>Thought:</strong> {{ post.raw_thought }}</p>
        <p><strong>Tone:</strong> {{ post.tone }}</p>
        <div class="post-box">{{ post.generated_post }}</div>
    </div>
    {% empty %}
    <div class="glass-card p-4">No history yet.</div>
    {% endfor %}
</div>
</body>
</html>
