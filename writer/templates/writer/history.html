<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>History - LinkedForge</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<style>

/* NAVBAR */
.navbar {
    background: transparent;
}

/* GRID */
.history-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
}

/* CARD */
.history-card {
    flex: 0 0 calc(50% - 8px);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px;
    display: flex;
    flex-direction: column;
}

/* POST BOX */
.post-box {
    background: rgba(0,0,0,0.2);
    border-radius: 12px;
    padding: 10px;
    white-space: pre-wrap;
    line-height: 1.6;
    font-size: 14px;
    max-height: 180px;
    overflow-y: auto;
}

/* ACTION ICONS */
.tool-btn {
    background: rgba(255,255,255,0.08);
    padding: 8px 12px;
    border-radius: 50px;
    cursor: pointer;
    transition: 0.3s;
}

.tool-btn:hover {
    transform: scale(1.1);
}

.copied {
    background: #28a745 !important;
    color: #fff;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .history-card {
        flex: 0 0 100%;
    }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar p-3">
<div class="container d-flex justify-content-between align-items-center">

    <h4 class="mb-0">🚀 LinkedForge</h4>

    <div class="toggle" id="themeToggle">
        <i class="fa-solid fa-moon"></i>
    </div>

</div>
</nav>

<!-- CONTENT -->
<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div>
            <h2 class="mb-1">📚 Recent Generated Posts</h2>
            <p class="muted mb-0">Your Last 5 AI LinkedIn post history</p>
        </div>

        <a href="/" class="btn btn-outline-light btn-sm">← Back Home</a>
    </div>

    <!-- GRID -->
    <div class="history-grid">

        {% for post in posts %}

        <div class="history-card">

            <!-- TEXT -->
            <div class="mb-2">
                <p class="mb-1"><strong>💡 Thought:</strong> {{ post.raw_thought }}</p>
                <p class="mb-1"><strong>🎯 Tone:</strong> {{ post.tone }}</p>
            </div>

            <!-- OUTPUT -->
            <div class="post-box mb-2 history-post">
                {{ post.generated_post }}
            </div>

            <!-- ACTIONS -->
            <div class="d-flex gap-2">

                <!-- COPY -->
                <div class="tool-btn copyBtn">
                    <i class="fa-regular fa-copy"></i>
                </div>

                <!-- EDIT -->
                <div class="tool-btn editBtn">
                    <i class="fa-regular fa-pen-to-square"></i>
                </div>

            </div>

        </div>

        {% empty %}

        <div class="history-card">
            No history yet.
        </div>

        {% endfor %}

    </div>

</div>

<!-- JS -->
<script>

// THEME
document.getElementById('themeToggle').addEventListener('click', () => {
    document.body.classList.toggle('light');
});

// COPY + EDIT per card
document.querySelectorAll('.history-card').forEach(card => {

    const post = card.querySelector('.history-post');
    const copyBtn = card.querySelector('.copyBtn');
    const editBtn = card.querySelector('.editBtn');

    // COPY
    copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(post.innerText);

        copyBtn.classList.add('copied');
        copyBtn.innerHTML = '<i class="fa-solid fa-check"></i>';

        setTimeout(() => {
            copyBtn.classList.remove('copied');
            copyBtn.innerHTML = '<i class="fa-regular fa-copy"></i>';
        }, 1000);
    });

    // EDIT
    editBtn.addEventListener('click', () => {
        post.contentEditable = true;
        post.focus();
    });

});

</script>

</body>
</html>
